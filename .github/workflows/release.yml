name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PKG_NAME: omdocker

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux GNU (dynamic linking)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
            cross: false
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
            cross: true
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
            cross: false

          # Linux MUSL (static linking)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
            cross: true

          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
            archive: tar.gz
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
            archive: tar.gz
            cross: false

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
            archive: zip
            cross: false
          - target: i686-pc-windows-msvc
            os: windows-latest
            ext: .exe
            archive: zip
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross

      - name: Install Linux cross-compilation dependencies
        if: contains(matrix.target, 'linux') && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            gcc-i686-linux-gnu \
            libc6-dev-i386-cross \
            patchelf

      - name: Set aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Set i686 linker
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_I686_UNKNOWN_LINUX_GNU_LINKER=i686-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        id: package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET=${{ matrix.target }}
          EXT=${{ matrix.ext }}
          ARCHIVE=${{ matrix.archive }}

          BINARY="target/$TARGET/release/${PKG_NAME}${EXT}"
          STAGING="${PKG_NAME}_${VERSION}_${TARGET}"
          ARCHIVE_NAME="${STAGING}.${ARCHIVE}"

          mkdir -p "dist/$STAGING"

          cp "$BINARY" "dist/$STAGING/"
          cp README.md "dist/$STAGING/" 2>/dev/null || true
          cp LICENSE "dist/$STAGING/" 2>/dev/null || true

          cd dist
          if [ "$ARCHIVE" = "zip" ]; then
            7z a "$ARCHIVE_NAME" "$STAGING"
          else
            tar czf "$ARCHIVE_NAME" "$STAGING"
          fi
          cd ..

          echo "artifact=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          echo "staging=$STAGING" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: dist/${{ steps.package.outputs.artifact }}

  package-macos-universal:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create universal macOS binary
        id: create-universal
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Find x86_64 and aarch64 archives
          AMD64_ARCHIVE=$(ls artifacts/${PKG_NAME}_${VERSION}_x86_64-apple-darwin.tar.gz)
          ARM64_ARCHIVE=$(ls artifacts/${PKG_NAME}_${VERSION}_aarch64-apple-darwin.tar.gz)

          # Extract both
          mkdir /tmp/amd64 /tmp/arm64
          tar xzf "$AMD64_ARCHIVE" -C /tmp/amd64
          tar xzf "$ARM64_ARCHIVE" -C /tmp/arm64

          # Create universal binary
          STAGING="${PKG_NAME}_${VERSION}_universal-apple-darwin"
          mkdir -p "dist/$STAGING"

          lipo -create \
            /tmp/amd64/*/${PKG_NAME} \
            /tmp/arm64/*/${PKG_NAME} \
            -output "dist/$STAGING/${PKG_NAME}"

          cp README.md "dist/$STAGING/" 2>/dev/null || true
          cp LICENSE "dist/$STAGING/" 2>/dev/null || true

          cd dist
          tar czf "${STAGING}.tar.gz" "$STAGING"
          echo "artifact=${STAGING}.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload universal macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-universal.outputs.artifact }}
          path: dist/${{ steps.create-universal.outputs.artifact }}

  checksums:
    needs: [build, package-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum * | tee SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: SHA256SUMS.txt

  create-release:
    needs: [build, checksums, package-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List all artifacts
        run: ls -la artifacts/

      - name: Create release and upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --draft \
            --generate-notes \
            --repo "${{ github.repository }}"

          for f in artifacts/*; do
            gh release upload "$TAG" "$f" --clobber --repo "${{ github.repository }}"
          done
